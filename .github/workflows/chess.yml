name: Community Chess

on:
  issues:
    types: [opened]

jobs:
  chess-move:
    if: startsWith(github.event.issue.title, 'chess|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-chess
        run: pip install python-chess

      - name: Process chess move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          COMMAND=$(echo "$ISSUE_TITLE" | cut -d'|' -f2)
          if [ "$COMMAND" = "new" ]; then
            python chess/game.py new
          else
            python chess/game.py move "$COMMAND" "$ISSUE_AUTHOR"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "♟️ Chess: ${{ github.event.issue.title }} by @${{ github.event.issue.user.login }}" || exit 0
          git push

      - name: Close issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "♟️ **Move processed!** Check the updated board on my profile."
